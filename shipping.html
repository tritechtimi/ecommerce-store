<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Delivery Options | PrimeCart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .shipping-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .shipping-card {
      background: white;
      border-radius: 28px;
      padding: 2rem;
      border: 1px solid #eef2f8;
    }
    body.dark .shipping-card {
      background: #1e293b;
      border-color: #334155;
    }
    .method-option {
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .method-option.selected {
      border-color: #2563eb;
      background: #2563eb10;
    }
    .method-title {
      font-weight: 700;
      font-size: 1.2rem;
      display: flex;
      justify-content: space-between;
    }
    .method-desc {
      font-size: 0.85rem;
      color: #6c86a3;
      margin-top: 0.5rem;
    }
    .location-group {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #e2e8f0;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    select, input {
      width: 100%;
      padding: 10px;
      border-radius: 16px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
    }
    body.dark select, body.dark input {
      background: #0f172a;
      border-color: #334155;
      color: white;
    }
    .next-btn {
      background: #2563eb;
      color: white;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1.5rem;
    }
    .cart-summary {
      background: #f8fafc;
      border-radius: 20px;
      padding: 1rem;
      margin-top: 1rem;
    }
    body.dark .cart-summary {
      background: #111827;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><span class="logo-mark">🚚</span> PrimeCart</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="admin.html">Admin Studio</a></li>
    </ul>
    <div class="nav-actions">
      <button class="icon-btn theme-toggle" id="themeToggleBtn">🌙</button>
      <a href="cart.html" class="cart-icon-btn">🛒 <span id="cartCount">0</span></a>
      <button class="hamburger" id="hamburgerBtn">☰</button>
    </div>
  </nav>

  <div class="shipping-container">
    <div class="shipping-card">
      <h2>📦 Delivery Options</h2>
      <div id="cartSummary" class="cart-summary">Loading cart...</div>

      <div class="method-option" id="pickupOption">
        <div class="method-title">
          <span>🏢 Pickup (Free)</span>
          <span>₦0</span>
        </div>
        <div class="method-desc">Collect your order from our store. No shipping fee.</div>
      </div>

      <div class="method-option" id="deliveryOption">
        <div class="method-title">
          <span>🚚 Waybill / Delivery</span>
          <span id="deliveryFeeDisplay">₦2,000</span>
        </div>
        <div class="method-desc">Delivered to your address. Shipping fee applies.</div>

        <div class="location-group" id="locationGroup" style="display: none;">
          <div class="form-group">
            <label>Delivery location</label>
            <select id="countrySelect">
              <option value="nigeria">Nigeria (₦2,000)</option>
              <option value="outside">Outside Nigeria (₦3,000)</option>
            </select>
          </div>
          <div class="form-group">
            <label>City / Address (optional)</label>
            <input type="text" id="deliveryLocation" placeholder="e.g., Ikeja, Lagos">
          </div>
        </div>
      </div>

      <button class="next-btn" id="proceedBtn">Proceed to Checkout →</button>
    </div>
  </div>

  <footer class="footer"><p>© 2025 PrimeCart</p></footer>

  <script type="module">
    import { supabase } from "./supabase.js";

    let cart = JSON.parse(localStorage.getItem("primecart_cart")) || [];
    let selectedMethod = "pickup";
    let shippingFee = 0;
    let shippingLocation = "";
    let country = "nigeria";

    function updateCartBadge() {
      const count = cart.reduce((s, i) => s + i.qty, 0);
      const badge = document.getElementById("cartCount");
      if (badge) badge.innerText = count;
    }

    function renderCartSummary() {
      const summaryDiv = document.getElementById("cartSummary");
      if (!summaryDiv) return;
      if (cart.length === 0) {
        summaryDiv.innerHTML = "<p>Your cart is empty. <a href='index.html'>Continue shopping</a></p>";
        document.getElementById("proceedBtn").disabled = true;
        return;
      }
      let subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
      let total = subtotal + shippingFee;
      summaryDiv.innerHTML = `
        <p><strong>Subtotal:</strong> ₦${subtotal.toLocaleString()}</p>
        <p><strong>Shipping fee:</strong> ₦${shippingFee.toLocaleString()}</p>
        <p><strong>Total:</strong> ₦${total.toLocaleString()}</p>
      `;
    }

    function updateShippingFee() {
      if (selectedMethod === "pickup") {
        shippingFee = 0;
        document.getElementById("deliveryFeeDisplay").innerText = "₦0";
        document.getElementById("locationGroup").style.display = "none";
      } else {
        country = document.getElementById("countrySelect").value;
        shippingFee = country === "nigeria" ? 2000 : 3000;
        document.getElementById("deliveryFeeDisplay").innerText = `₦${shippingFee.toLocaleString()}`;
        document.getElementById("locationGroup").style.display = "block";
      }
      renderCartSummary();
    }

    // Event listeners
    document.getElementById("pickupOption").addEventListener("click", () => {
      selectedMethod = "pickup";
      document.getElementById("pickupOption").classList.add("selected");
      document.getElementById("deliveryOption").classList.remove("selected");
      updateShippingFee();
    });

    document.getElementById("deliveryOption").addEventListener("click", () => {
      selectedMethod = "delivery";
      document.getElementById("deliveryOption").classList.add("selected");
      document.getElementById("pickupOption").classList.remove("selected");
      updateShippingFee();
    });

    document.getElementById("countrySelect").addEventListener("change", () => {
      if (selectedMethod === "delivery") updateShippingFee();
    });

    document.getElementById("proceedBtn").addEventListener("click", () => {
      if (cart.length === 0) {
        alert("Your cart is empty.");
        window.location.href = "index.html";
        return;
      }
      const shippingData = {
        method: selectedMethod,
        fee: shippingFee,
        location: selectedMethod === "delivery" ? document.getElementById("deliveryLocation").value.trim() : null,
        country: selectedMethod === "delivery" ? country : null
      };
      localStorage.setItem("shipping_data", JSON.stringify(shippingData));
      window.location.href = "checkout.html";
    });

    // Initial load
    updateCartBadge();
    renderCartSummary();
    document.getElementById("pickupOption").classList.add("selected");
    updateShippingFee();

    // Theme & menu
    function setThemeIcon() { const isDark = document.body.classList.contains("dark"); const btn = document.getElementById("themeToggleBtn"); if(btn) btn.textContent = isDark ? "☀️" : "🌙"; }
    window.toggleTheme = () => { document.body.classList.toggle("dark"); localStorage.setItem("primecart_theme", document.body.classList.contains("dark") ? "dark" : "light"); setThemeIcon(); };
    if (localStorage.getItem("primecart_theme") === "dark") document.body.classList.add("dark");
    setThemeIcon();
    document.getElementById("themeToggleBtn")?.addEventListener("click", () => window.toggleTheme());
    window.toggleMenu = () => document.getElementById("navLinks").classList.toggle("active");
    document.getElementById("hamburgerBtn")?.addEventListener("click", () => window.toggleMenu());
  </script>
</body>
</html>
