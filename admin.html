<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Admin Studio | PrimeCart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><span class="logo-mark">🎨</span> Admin Studio</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Storefront</a></li>
      <li><a href="#" class="active-nav">Inventory</a></li>
    </ul>
    <div class="nav-actions">
      <button class="icon-btn theme-toggle" id="adminThemeBtn">🌙</button>
      <button class="hamburger" id="adminHamburger">☰</button>
    </div>
  </nav>

  <div class="admin-container">
    <div class="admin-grid">
      <div class="form-card">
        <h2 style="margin-bottom: 1rem;">➕ Add New Product</h2>
        <div class="form-group"><label>Product name *</label><input type="text" id="prodName" placeholder="e.g., Wireless Headphones"></div>
        <div class="form-group"><label>Price (₦) *</label><input type="number" id="prodPrice" placeholder="29900"></div>
        <div class="form-group"><label>Description</label><textarea id="prodDesc" rows="3" placeholder="Full product description..."></textarea></div>
        <div class="form-group"><label>Category</label><input type="text" id="prodCategory" placeholder="e.g., Electronics"></div>
        <div class="form-group"><label>Stock Quantity</label><input type="number" id="prodStock" value="10"></div>
        <div class="form-group"><label>Product Images (multiple)</label><input type="file" id="prodImages" accept="image/jpeg,image/png,image/webp" multiple><div id="imagePreviewContainer" class="images-preview"></div></div>
        <button class="btn-submit" id="saveProductBtn">✨ Publish Product</button>
      </div>
      <div class="list-card">
        <h2 style="margin-bottom: 1rem;">📦 Manage Products</h2>
        <div id="adminProductList" class="product-list"><div class="loader-shimmer">Loading products...</div></div>
      </div>
    </div>
  </div>
  <footer class="footer"><p>PrimeCart Admin · Multi‑image, category & stock</p></footer>

  <script type="module">
    import { supabase } from "./supabase.js";
    const nameInput = document.getElementById("prodName");
    const priceInput = document.getElementById("prodPrice");
    const descInput = document.getElementById("prodDesc");
    const categoryInput = document.getElementById("prodCategory");
    const stockInput = document.getElementById("prodStock");
    const imagesInput = document.getElementById("prodImages");
    const previewContainer = document.getElementById("imagePreviewContainer");
    const saveBtn = document.getElementById("saveProductBtn");
    const listContainer = document.getElementById("adminProductList");
    let selectedFiles = [];

    imagesInput.addEventListener("change", (e) => {
      selectedFiles = Array.from(e.target.files);
      previewContainer.innerHTML = "";
      selectedFiles.forEach((file, idx) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const div = document.createElement("div");
          div.className = "image-preview-item";
          div.innerHTML = `<img src="${ev.target.result}" alt="preview"><span class="remove-image" data-index="${idx}">✕</span>`;
          previewContainer.appendChild(div);
          div.querySelector(".remove-image").addEventListener("click", () => {
            selectedFiles.splice(idx, 1);
            imagesInput.files = dataTransferToFileList(selectedFiles);
            imagesInput.dispatchEvent(new Event('change'));
          });
        };
        reader.readAsDataURL(file);
      });
    });
    function dataTransferToFileList(files) { const dt = new DataTransfer(); files.forEach(f => dt.items.add(f)); return dt.files; }

    async function uploadImages(files, productSlug) {
      const urls = [];
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const ext = file.name.split('.').pop();
        const fileName = `${productSlug}-${Date.now()}-${i}.${ext}`;
        const filePath = `public/${fileName}`;
        const { error } = await supabase.storage.from('product-images').upload(filePath, file, { cacheControl: '3600' });
        if (error) throw error;
        const { data: publicUrl } = supabase.storage.from('product-images').getPublicUrl(filePath);
        urls.push(publicUrl.publicUrl);
      }
      return urls;
    }

    async function addProduct() {
      const name = nameInput.value.trim();
      const price = priceInput.value.trim();
      const description = descInput.value.trim();
      const category = categoryInput.value.trim();
      const stock = parseInt(stockInput.value) || 0;
      const files = selectedFiles;
      if (!name || !price) { alert("Name and price required."); return; }
      const priceNum = Number(price);
      if (isNaN(priceNum)) { alert("Invalid price."); return; }
      const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || `product-${Date.now()}`;
      saveBtn.disabled = true; saveBtn.textContent = "⏳ Uploading images...";
      try {
        let imageUrls = [];
        if (files.length > 0) imageUrls = await uploadImages(files, slug);
        const { error } = await supabase.from("products").insert([{ name, price: priceNum, description, slug, is_active: true, image_urls: imageUrls, category, stock_quantity: stock }]);
        if (error) throw error;
        alert("✅ Product added with " + imageUrls.length + " images!");
        nameInput.value = ""; priceInput.value = ""; descInput.value = ""; categoryInput.value = ""; stockInput.value = "10";
        imagesInput.value = ""; selectedFiles = []; previewContainer.innerHTML = "";
        await fetchProducts();
      } catch (err) { alert("Error: " + err.message); }
      finally { saveBtn.disabled = false; saveBtn.textContent = "✨ Publish Product"; }
    }

    async function fetchProducts() {
      try {
        listContainer.innerHTML = `<div class="loader-shimmer">Loading...</div>`;
        const { data, error } = await supabase.from("products").select("*").order("id", { ascending: false });
        if (error) throw error;
        if (!data || data.length === 0) { listContainer.innerHTML = `<p style="text-align:center;">No products yet.</p>`; return; }
        listContainer.innerHTML = "";
        data.forEach(prod => {
          const firstImage = (prod.image_urls && prod.image_urls[0]) || "https://placehold.co/50x50?text=No+Img";
          const div = document.createElement("div");
          div.className = "product-item";
          div.innerHTML = `<div class="product-info"><img src="${firstImage}" class="product-thumb"><div><strong>${escapeHtml(prod.name)}</strong><br>₦${Number(prod.price).toLocaleString()}<br>Stock: ${prod.stock_quantity} | ${escapeHtml(prod.category || "Uncategorized")}</div></div><button class="delete-product" data-id="${prod.id}">Delete</button>`;
          listContainer.appendChild(div);
        });
        document.querySelectorAll(".delete-product").forEach(btn => { btn.addEventListener("click", async (e) => { if(confirm("Delete?")) { await supabase.from("products").delete().eq("id", btn.getAttribute("data-id")); fetchProducts(); } }); });
      } catch (err) { listContainer.innerHTML = `<div class="error-state">Failed to load.</div>`; }
    }

    function escapeHtml(str) { return str?.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) || ""; }
    function setThemeIcon() { const isDark = document.body.classList.contains("dark"); const btn = document.getElementById("adminThemeBtn"); if(btn) btn.textContent = isDark ? "☀️" : "🌙"; }
    window.toggleThemeAdmin = () => { document.body.classList.toggle("dark"); localStorage.setItem("primecart_theme", document.body.classList.contains("dark") ? "dark" : "light"); setThemeIcon(); };
    if (localStorage.getItem("primecart_theme") === "dark") document.body.classList.add("dark");
    setThemeIcon();
    document.getElementById("adminThemeBtn")?.addEventListener("click", () => window.toggleThemeAdmin());
    window.toggleAdminMenu = () => document.getElementById("navLinks").classList.toggle("active");
    document.getElementById("adminHamburger")?.addEventListener("click", () => window.toggleAdminMenu());
    saveBtn.addEventListener("click", addProduct);
    fetchProducts();
  </script>
</body>
</html>
