<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body class="dark">

<nav class="nav">
  <div class="nav-logo">🛠 Admin Panel</div>
  <button class="hamburger" onclick="toggleMenu()">☰</button>
</nav>

<div class="container">

  <h2>Create Product</h2>

  <input id="name" placeholder="Product name"/>
  <input id="price" type="number" placeholder="Price"/>
  <textarea id="desc" placeholder="Description"></textarea>

  <!-- IMAGE INPUT -->
  <input type="file" id="image" accept="image/*"/>

  <button onclick="addProduct()">Save Product</button>

  <hr/>

  <h2>Products</h2>
  <div id="list"></div>

</div>

<script type="module">
import { supabase } from "./supabase.js";

/* =========================
UPLOAD IMAGE TO SUPABASE
========================= */
async function uploadImage(file) {
  const fileName = Date.now() + "-" + file.name;

  const { data, error } = await supabase.storage
    .from("products")
    .upload(fileName, file);

  if (error) {
    console.log(error);
    return null;
  }

  const { data: urlData } = supabase.storage
    .from("products")
    .getPublicUrl(fileName);

  return urlData.publicUrl;
}

/* =========================
ADD PRODUCT
========================= */
window.addProduct = async function () {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const desc = document.getElementById("desc").value;
  const imageFile = document.getElementById("image").files[0];

  if (!name || !price) {
    alert("Fill required fields");
    return;
  }

  let imageUrl = "";

  if (imageFile) {
    imageUrl = await uploadImage(imageFile);
  }

  const slug = name.toLowerCase().replace(/\s+/g, "-");

  const { error } = await supabase.from("products").insert([
    {
      name,
      price,
      description: desc,
      slug,
      image_url: imageUrl
    }
  ]);

  if (error) {
    alert(error.message);
  } else {
    alert("Product added!");
    loadProducts();
  }
};

/* =========================
LOAD PRODUCTS
========================= */
async function loadProducts() {
  const { data } = await supabase.from("products").select("*");

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(p => {
    list.innerHTML += `
      <div style="border:1px solid #444;padding:10px;margin:10px;border-radius:10px">
        <img src="${p.image_url}" style="width:100px;height:100px;object-fit:cover"/>
        <h3>${p.name}</h3>
        <p>₦${p.price}</p>
      </div>
    `;
  });
}

loadProducts();

/* MENU */
window.toggleMenu = function(){
  alert("Menu clicked");
};
</script>

</body>
</html>
