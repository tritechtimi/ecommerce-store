<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Admin Studio | PrimeCart</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>
/* =========================
   BASE LAYOUT FIX
========================= */
.admin-dashboard{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* GRID */
.admin-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* CARD */
.card{
  background:var(--card-bg, #fff);
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:20px;
}

body.dark .card{
  background:#1e293b;
  border-color:#334155;
}

/* INPUTS */
input, textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  outline:none;
}

body.dark input,
body.dark textarea{
  background:#0f172a;
  color:#fff;
  border-color:#334155;
}

/* BUTTON */
button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

/* PRODUCT LIST */
.product{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #eee;
}

body.dark .product{
  border-color:#334155;
}

/* IMAGE */
.preview-img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:10px;
  margin-top:8px;
}

/* MOBILE */
@media(max-width:768px){
  .admin-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">🛠 Admin Studio</div>

  <div class="nav-actions">
    <button onclick="toggleTheme()">🌙</button>
  </div>
</nav>

<!-- DASHBOARD -->
<div class="admin-dashboard">

  <div class="admin-grid">

    <!-- CREATE PRODUCT -->
    <div class="card">
      <h2>Add Product</h2>

      <label>Name</label>
      <input id="name" type="text" placeholder="Product name">

      <label>Price</label>
      <input id="price" type="number" placeholder="Price">

      <label>Description</label>
      <textarea id="desc" placeholder="Description"></textarea>

      <label>Image</label>
      <input id="image" type="file" accept="image/*">

      <button onclick="addProduct()">Save Product</button>
    </div>

    <!-- PRODUCT LIST -->
    <div class="card">
      <h2>Products</h2>
      <div id="list"></div>
    </div>

  </div>
</div>

<script type="module">
import { supabase } from "./supabase.js";

/* =========================
   ADD PRODUCT
========================= */
window.addProduct = async function(){

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const desc = document.getElementById("desc").value;
  const file = document.getElementById("image").files[0];

  if(!name || !price){
    alert("Name and price required");
    return;
  }

  let imageUrl = "";

  /* UPLOAD IMAGE */
  if(file){
    const fileName = Date.now() + "-" + file.name;

    const { error: uploadError } = await supabase
      .storage
      .from("product-images")
      .upload(fileName, file);

    if(uploadError){
      alert(uploadError.message);
      return;
    }

    const { data } = supabase
      .storage
      .from("product-images")
      .getPublicUrl(fileName);

    imageUrl = data.publicUrl;
  }

  /* SLUG */
  const slug = name.toLowerCase().replace(/\s+/g,"-");

  /* SAVE */
  const { error } = await supabase
    .from("products")
    .insert([{
      name,
      price: Number(price),
      description: desc,
      slug,
      image: imageUrl
    }]);

  if(error){
    alert(error.message);
    return;
  }

  alert("Product added!");

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("desc").value = "";
  document.getElementById("image").value = "";

  loadProducts();
};


/* =========================
   LOAD PRODUCTS
========================= */
async function loadProducts(){

  const { data } = await supabase
    .from("products")
    .select("*")
    .order("id",{ascending:false});

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(p => {

    list.innerHTML += `
      <div class="product">
        <div>
          <strong>${p.name}</strong><br>
          ₦${p.price}

          ${p.image ? `<img src="${p.image}" class="preview-img">` : ""}
        </div>

        <button onclick="deleteProduct(${p.id})">Delete</button>
      </div>
    `;
  });
}


/* =========================
   DELETE PRODUCT
========================= */
window.deleteProduct = async function(id){

  await supabase
    .from("products")
    .delete()
    .eq("id", id);

  loadProducts();
};

loadProducts();
</script>

</body>
</html>
