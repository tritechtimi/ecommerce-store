<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PrimeCart | Modern Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Search bar styles */
    .search-container {
      max-width: 600px;
      margin: 0 auto 2rem auto;
      padding: 0 1rem;
    }
    .search-input {
      width: 100%;
      padding: 14px 20px;
      border-radius: 50px;
      border: 1px solid #e2e8f0;
      background: white;
      font-size: 1rem;
      transition: 0.2s;
    }
    body.dark .search-input {
      background: #1e293b;
      border-color: #334155;
      color: white;
    }
    .search-input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><span class="logo-mark">🛒</span> PrimeCart</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" class="active-nav">Home</a></li>
      <li><a href="admin.html">Admin Studio</a></li>
    </ul>
    <div class="nav-actions">
      <button class="icon-btn theme-toggle" id="themeToggleBtn">🌙</button>
      <a href="cart.html" class="cart-icon-btn">🛒 <span id="cartCount">0</span></a>
      <button class="hamburger" id="hamburgerBtn">☰</button>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-badge">✨ new season arrival</div>
    <h1>Shop Smart. <span class="accent-text">Buy Better.</span></h1>
    <p>Minimalist e‑commerce powered by Supabase — lightning fast & artistic.</p>
    <div class="hero-cta"><button class="btn-primary" id="exploreBtn">Explore collection →</button></div>
  </section>

  <section class="grid-section">
    <div class="section-header">
      <div class="section-label">Curated for you</div>
      <div class="section-line"></div>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search products by name, category, or description...">
    </div>

    <div id="productGrid" class="product-grid">
      <div class="loader-shimmer">Loading timeless pieces...</div>
    </div>
  </section>

  <footer class="footer"><p>© 2025 PrimeCart — minimalist aesthetics, powerful backend.</p></footer>

  <script type="module">
    import { supabase } from "./supabase.js";

    // ---------- CART HELPERS ----------
    let cart = JSON.parse(localStorage.getItem("primecart_cart")) || [];
    function saveCart() { localStorage.setItem("primecart_cart", JSON.stringify(cart)); }
    function updateCartBadge() {
      const count = cart.reduce((s, i) => s + i.qty, 0);
      const badge = document.getElementById("cartCount");
      if (badge) badge.innerText = count;
    }
    window.addToCart = function(product, qty = 1) {
      const existing = cart.find(i => i.id === product.id);
      if (existing) existing.qty += qty;
      else cart.push({ id: product.id, name: product.name, price: Number(product.price), qty, image: product.image_urls?.[0] || "" });
      saveCart();
      updateCartBadge();
      alert(`${product.name} added to cart!`);
    };

    // Helper: rating stars
    function renderStars(rating) {
      const full = Math.floor(rating);
      const half = rating % 1 >= 0.5;
      let stars = '';
      for (let i = 0; i < full; i++) stars += '<span class="star-filled">★</span>';
      if (half) stars += '<span class="star-half">★</span>';
      for (let i = stars.length; i < 5; i++) stars += '<span class="star-empty">★</span>';
      return `<div class="rating-stars">${stars}<span class="rating-value">(${rating.toFixed(1)})</span></div>`;
    }

    // ---------- HOT BADGE LOGIC ----------
    function getProductBadge(avgRating, reviewCount, salesCount) {
      // Prioritize sales for "Hot" badge, then reviews+rating
      if (salesCount >= 10) return { text: "🔥 Hot", className: "badge-hot" };
      if (reviewCount >= 5 && avgRating >= 4) return { text: "🔥 Hot", className: "badge-hot" };
      if (salesCount >= 3) return { text: "⭐ Popular", className: "badge-popular" };
      if (reviewCount >= 2 && avgRating >= 3.5) return { text: "⭐ Popular", className: "badge-popular" };
      return { text: "🆕 New", className: "badge-new" };
    }

    // Popularity score (sales + reviews + rating)
    function getPopularityScore(sales, reviews, rating) {
      return (sales * 0.6) + (reviews * 0.3) + (rating * 10);
    }

    let allProducts = []; // store all products for search filtering

    // Render products (with optional search filter)
    function renderProducts(filterText = "") {
      const grid = document.getElementById("productGrid");
      if (!grid) return;

      let filtered = [...allProducts];
      if (filterText.trim() !== "") {
        const term = filterText.toLowerCase();
        filtered = filtered.filter(p => 
          p.name.toLowerCase().includes(term) ||
          (p.category && p.category.toLowerCase().includes(term)) ||
          (p.description && p.description.toLowerCase().includes(term))
        );
      }

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state">🔍 No products match "${escapeHtml(filterText)}"</div>`;
        return;
      }

      grid.innerHTML = "";
      filtered.forEach(product => {
        const firstImage = (product.image_urls && product.image_urls[0]) || "https://placehold.co/600x400?text=No+Image";
        const badge = getProductBadge(product.avgRating, product.reviewCount, product.sales_count || 0);
        const stockClass = product.stock_quantity <= 0 ? "stock-out" : (product.stock_quantity < 5 ? "stock-low" : "stock-instock");
        const stockText = product.stock_quantity <= 0 ? "Out of Stock" : (product.stock_quantity < 5 ? `Only ${product.stock_quantity} left` : `${product.stock_quantity} in stock`);
        
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
          <div class="card-image"><img src="${escapeHtml(firstImage)}" alt="${escapeHtml(product.name)}" loading="lazy" onerror="this.src='https://placehold.co/600x400?text=Error'"></div>
          <div class="card-content">
            <div class="badge ${badge.className}">${badge.text}</div>
            <div><span class="product-category">${escapeHtml(product.category || "Uncategorized")}</span><span class="stock-badge ${stockClass}">${stockText}</span></div>
            <h3 class="product-title">${escapeHtml(product.name)}</h3>
            ${renderStars(product.avgRating)}
            <div class="product-price">₦${Number(product.price).toLocaleString()}</div>
            <div class="sales-info">📊 ${product.sales_count || 0} sold</div>
            <a href="product.html?id=${product.id}" class="view-details-btn">View Details</a>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Load products from Supabase
    async function loadProducts() {
      const grid = document.getElementById("productGrid");
      if (!grid) return;
      try {
        grid.innerHTML = `<div class="loader-shimmer">✨ Curating collection...</div>`;

        // 1. Fetch all products
        const { data: products, error: productsError } = await supabase
          .from("products")
          .select("*")
          .order("id", { ascending: false });
        if (productsError) throw productsError;
        if (!products || products.length === 0) {
          grid.innerHTML = `<div class="empty-state">🎨 No products yet — visit admin to add masterpieces.</div>`;
          return;
        }

        // 2. Fetch review counts per product
        const { data: reviewsData, error: reviewsError } = await supabase
          .from("reviews")
          .select("product_id, rating");
        if (reviewsError) console.warn("Could not load reviews", reviewsError);

        const reviewMap = new Map();
        if (reviewsData) {
          reviewsData.forEach(r => {
            if (!reviewMap.has(r.product_id)) {
              reviewMap.set(r.product_id, { count: 0, sum: 0 });
            }
            const entry = reviewMap.get(r.product_id);
            entry.count++;
            entry.sum += r.rating;
          });
        }

        // 3. Enrich products with review data and popularity score
        const enriched = products.map(p => {
          const rev = reviewMap.get(p.id) || { count: 0, sum: 0 };
          const avgRating = rev.count > 0 ? rev.sum / rev.count : (p.rating_avg || 0);
          const reviewCount = rev.count;
          const sales = p.sales_count || 0;
          const score = getPopularityScore(sales, reviewCount, avgRating);
          return { ...p, avgRating, reviewCount, score };
        });

        // 4. Sort by popularity (highest first)
        enriched.sort((a, b) => b.score - a.score);

        allProducts = enriched;
        renderProducts(); // initial render without search
      } catch (err) {
        console.error("Error loading products:", err);
        grid.innerHTML = `<div class="error-state">⚠️ Failed to load products: ${err.message}</div>`;
      }
    }

    function escapeHtml(str) { return str?.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) || ""; }

    // ---------- THEME & MOBILE MENU ----------
    function setThemeIcon() {
      const isDark = document.body.classList.contains("dark");
      const btn = document.getElementById("themeToggleBtn");
      if (btn) btn.textContent = isDark ? "☀️" : "🌙";
    }
    window.toggleTheme = () => {
      document.body.classList.toggle("dark");
      localStorage.setItem("primecart_theme", document.body.classList.contains("dark") ? "dark" : "light");
      setThemeIcon();
    };
    const savedTheme = localStorage.getItem("primecart_theme");
    if (savedTheme === "dark") document.body.classList.add("dark");
    setThemeIcon();
    document.getElementById("themeToggleBtn")?.addEventListener("click", () => window.toggleTheme());

    window.toggleMenu = () => document.getElementById("navLinks").classList.toggle("active");
    document.getElementById("hamburgerBtn")?.addEventListener("click", () => window.toggleMenu());
    document.getElementById("exploreBtn")?.addEventListener("click", () => {
      document.querySelector(".grid-section")?.scrollIntoView({ behavior: "smooth" });
    });

    // ---------- SEARCH EVENT ----------
    const searchInput = document.getElementById("searchInput");
    if (searchInput) {
      searchInput.addEventListener("input", (e) => {
        renderProducts(e.target.value);
      });
    }

    updateCartBadge();
    loadProducts();
  </script>
</body>
</html>
