<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PrimeCart | Modern Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><span class="logo-mark">🛒</span> PrimeCart</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" class="active-nav">Home</a></li>
      <li><a href="admin.html">Admin Studio</a></li>
    </ul>
    <div class="nav-actions">
      <button class="icon-btn theme-toggle" id="themeToggleBtn">🌙</button>
      <a href="cart.html" class="cart-icon-btn">🛒 <span id="cartCount">0</span></a>
      <button class="hamburger" id="hamburgerBtn">☰</button>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-badge">✨ new season arrival</div>
    <h1>Shop Smart. <span class="accent-text">Buy Better.</span></h1>
    <p>Minimalist e‑commerce powered by Supabase — lightning fast & artistic.</p>
    <div class="hero-cta"><button class="btn-primary" id="exploreBtn">Explore collection →</button></div>
  </section>

  <section class="grid-section">
    <div class="section-header"><div class="section-label">Curated for you</div><div class="section-line"></div></div>
    <div id="productGrid" class="product-grid"><div class="loader-shimmer">Loading timeless pieces...</div></div>
  </section>

  <footer class="footer"><p>© 2025 PrimeCart — minimalist aesthetics, powerful backend.</p></footer>

  <script type="module">
    import { supabase } from "./supabase.js";

    // Cart helpers
    let cart = JSON.parse(localStorage.getItem("primecart_cart")) || [];
    function saveCart() { localStorage.setItem("primecart_cart", JSON.stringify(cart)); }
    function updateCartBadge() {
      const count = cart.reduce((s, i) => s + i.qty, 0);
      const badge = document.getElementById("cartCount");
      if (badge) badge.innerText = count;
    }
    window.addToCart = function(product, qty = 1) {
      const existing = cart.find(i => i.id === product.id);
      if (existing) existing.qty += qty;
      else cart.push({ id: product.id, name: product.name, price: Number(product.price), qty, image: product.image_urls?.[0] || "" });
      saveCart();
      updateCartBadge();
      alert(`${product.name} added to cart!`);
    };

    // Helper: rating stars HTML
    function renderStars(rating) {
      const full = Math.floor(rating);
      const half = rating % 1 >= 0.5;
      let stars = '';
      for (let i = 0; i < full; i++) stars += '<span class="star-filled">★</span>';
      if (half) stars += '<span class="star-half">★</span>';
      for (let i = stars.length; i < 5; i++) stars += '<span class="star-empty">★</span>';
      return `<div class="rating-stars">${stars}<span class="rating-value">(${rating.toFixed(1)})</span></div>`;
    }

    // Load products
    const grid = document.getElementById("productGrid");
    async function loadProducts() {
      try {
        grid.innerHTML = `<div class="loader-shimmer">✨ Curating collection...</div>`;
        const { data, error } = await supabase.from("products").select("*").order("id", { ascending: false });
        if (error) throw error;
        if (!data || data.length === 0) { grid.innerHTML = `<div class="empty-state">🎨 No products yet — visit admin to add masterpieces.</div>`; return; }
        grid.innerHTML = "";
        data.forEach(product => {
          const firstImage = (product.image_urls && product.image_urls[0]) || "https://placehold.co/600x400?text=No+Image";
          let stockClass = "stock-instock";
          let stockText = "In Stock";
          if (product.stock_quantity <= 0) { stockClass = "stock-out"; stockText = "Out of Stock"; }
          else if (product.stock_quantity < 5) { stockClass = "stock-low"; stockText = `Only ${product.stock_quantity} left`; }
          const card = document.createElement("div");
          card.className = "product-card";
          card.innerHTML = `
            <div class="card-image"><img src="${escapeHtml(firstImage)}" alt="${escapeHtml(product.name)}" loading="lazy" onerror="this.src='https://placehold.co/600x400?text=Error'"></div>
            <div class="card-content">
              <div><span class="product-category">${escapeHtml(product.category || "Uncategorized")}</span><span class="stock-badge ${stockClass}">${stockText}</span></div>
              <h3 class="product-title">${escapeHtml(product.name)}</h3>
              ${renderStars(product.rating_avg || 0)}
              <div class="product-price">₦${Number(product.price).toLocaleString()}</div>
              <a href="product.html?id=${product.id}" class="view-details-btn">View Details</a>
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (err) { grid.innerHTML = `<div class="error-state">⚠️ Failed to load products.</div>`; }
    }

    function escapeHtml(str) { return str?.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) || ""; }

    // Theme & mobile menu
    function setThemeIcon() { const isDark = document.body.classList.contains("dark"); const btn = document.getElementById("themeToggleBtn"); if(btn) btn.textContent = isDark ? "☀️" : "🌙"; }
    window.toggleTheme = () => { document.body.classList.toggle("dark"); localStorage.setItem("primecart_theme", document.body.classList.contains("dark") ? "dark" : "light"); setThemeIcon(); };
    if (localStorage.getItem("primecart_theme") === "dark") document.body.classList.add("dark");
    setThemeIcon();
    document.getElementById("themeToggleBtn")?.addEventListener("click", () => window.toggleTheme());
    window.toggleMenu = () => document.getElementById("navLinks").classList.toggle("active");
    document.getElementById("hamburgerBtn")?.addEventListener("click", () => window.toggleMenu());
    document.getElementById("exploreBtn")?.addEventListener("click", () => document.querySelector(".grid-section")?.scrollIntoView({ behavior: "smooth" }));

    updateCartBadge();
    loadProducts();
  </script>
</body>
</html>
