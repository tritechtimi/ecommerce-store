<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Test Payment | PrimeCart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .payment-container {
      max-width: 500px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }
    .payment-card {
      background: white;
      border-radius: 28px;
      padding: 2rem;
      border: 1px solid #eef2f8;
      text-align: center;
    }
    body.dark .payment-card {
      background: #1e293b;
      border-color: #334155;
    }
    .order-details {
      background: #f8fafc;
      border-radius: 20px;
      padding: 1rem;
      margin: 1rem 0;
      text-align: left;
    }
    body.dark .order-details {
      background: #111827;
    }
    .mock-card {
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 1rem;
      margin: 1rem 0;
    }
    .mock-card input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
    }
    .pay-btn {
      background: #22c55e;
      color: white;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1rem;
    }
    .note {
      font-size: 0.7rem;
      color: #6c86a3;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><span class="logo-mark">💳</span> PrimeCart</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="admin.html">Admin Studio</a></li>
    </ul>
    <div class="nav-actions">
      <button class="icon-btn theme-toggle" id="themeToggleBtn">🌙</button>
      <a href="cart.html" class="cart-icon-btn">🛒 <span id="cartCount">0</span></a>
      <button class="hamburger" id="hamburgerBtn">☰</button>
    </div>
  </nav>

  <div class="payment-container">
    <div class="payment-card">
      <h2>💳 Test Payment</h2>
      <p>Complete your order with a test transaction</p>
      <div id="orderInfo" class="order-details">Loading order details...</div>

      <div class="mock-card">
        <h4>💳 Mock Card Details</h4>
        <input type="text" placeholder="Card Number (any 16 digits)" id="cardNumber" value="4242 4242 4242 4242">
        <div style="display: flex; gap: 10px;">
          <input type="text" placeholder="MM/YY" id="expiry" value="12/28">
          <input type="text" placeholder="CVC" id="cvc" value="123">
        </div>
        <input type="text" placeholder="Cardholder Name" id="cardName" value="TEST USER">
      </div>

      <button class="pay-btn" id="payBtn">Pay Now (Test)</button>
      <p class="note">🔐 This is a test simulation – no real payment is processed.</p>
    </div>
  </div>

  <footer class="footer"><p>© 2025 PrimeCart</p></footer>

  <script type="module">
    import { supabase } from "./supabase.js";

    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('order_id');
    let orderData = null;

    async function loadOrder() {
      const infoDiv = document.getElementById("orderInfo");
      if (!orderId) {
        infoDiv.innerHTML = "<p>❌ No order ID provided. Please go back to checkout.</p>";
        return;
      }
      try {
        const { data: order, error } = await supabase
          .from("orders")
          .select("*")
          .eq("id", orderId)
          .single();
        if (error) throw error;
        if (!order) throw new Error("Order not found");
        orderData = order;
        infoDiv.innerHTML = `
          <p><strong>Order #:</strong> ${escapeHtml(order.order_number)}</p>
          <p><strong>Total:</strong> ₦${Number(order.total_amount).toLocaleString()}</p>
          <p><strong>Customer:</strong> ${escapeHtml(order.customer_name)}</p>
          <p><strong>Status:</strong> ${order.status}</p>
        `;
      } catch (err) {
        infoDiv.innerHTML = `<p style="color:#ef4444;">Error: ${err.message}</p>`;
      }
    }

    async function processPayment() {
      if (!orderData) {
        alert("Order not loaded. Refresh and try again.");
        return;
      }
      const payBtn = document.getElementById("payBtn");
      payBtn.disabled = true;
      payBtn.textContent = "Processing...";

      // Simulate network delay
      await new Promise(resolve => setTimeout(resolve, 1500));

      try {
        // Update order status to 'paid' (or 'processing')
        const { error } = await supabase
          .from("orders")
          .update({ status: "paid" })
          .eq("id", orderId);
        if (error) throw error;

        alert("✅ Payment successful! Order confirmed.");
        window.location.href = `order-confirmation.html?order=${orderData.order_number}`;
      } catch (err) {
        alert("Payment simulation failed: " + err.message);
        payBtn.disabled = false;
        payBtn.textContent = "Pay Now (Test)";
      }
    }

    function escapeHtml(str) { return str?.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) || ""; }

    // Theme & menu (same as always)
    function setThemeIcon() { const isDark = document.body.classList.contains("dark"); const btn = document.getElementById("themeToggleBtn"); if(btn) btn.textContent = isDark ? "☀️" : "🌙"; }
    window.toggleTheme = () => { document.body.classList.toggle("dark"); localStorage.setItem("primecart_theme", document.body.classList.contains("dark") ? "dark" : "light"); setThemeIcon(); };
    if (localStorage.getItem("primecart_theme") === "dark") document.body.classList.add("dark");
    setThemeIcon();
    document.getElementById("themeToggleBtn")?.addEventListener("click", () => window.toggleTheme());
    window.toggleMenu = () => document.getElementById("navLinks").classList.toggle("active");
    document.getElementById("hamburgerBtn")?.addEventListener("click", () => window.toggleMenu());

    // Cart badge (cart is cleared after checkout, so count = 0)
    document.getElementById("cartCount").innerText = "0";

    loadOrder();
    document.getElementById("payBtn").addEventListener("click", processPayment);
  </script>
</body>
</html>
