<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Checkout | PrimeCart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .checkout-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 1fr 0.8fr;
      gap: 2rem;
    }
    @media (max-width: 768px) { .checkout-container { grid-template-columns: 1fr; } }
    .checkout-form, .order-summary {
      background: white;
      border-radius: 28px;
      padding: 1.5rem;
      border: 1px solid #eef2f8;
    }
    body.dark .checkout-form, body.dark .order-summary {
      background: #1e293b;
      border-color: #334155;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.4rem; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: 16px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
    }
    body.dark .form-group input, body.dark .form-group textarea {
      background: #0f172a;
      border-color: #334155;
      color: white;
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eef2f8;
    }
    .summary-total {
      font-size: 1.3rem;
      font-weight: 800;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 2px solid #2563eb;
    }
    .place-order-btn {
      background: #22c55e;
      color: white;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1rem;
    }
    .back-link {
      display: inline-block;
      margin-top: 1rem;
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><span class="logo-mark">🛒</span> PrimeCart</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="admin.html">Admin Studio</a></li>
    </ul>
    <div class="nav-actions">
      <button class="icon-btn theme-toggle" id="themeToggleBtn">🌙</button>
      <a href="cart.html" class="cart-icon-btn">🛒 <span id="cartCount">0</span></a>
      <button class="hamburger" id="hamburgerBtn">☰</button>
    </div>
  </nav>

  <div class="checkout-container">
    <div class="checkout-form">
      <h2>Delivery Information</h2>
      <form id="checkoutForm">
        <div class="form-group"><label>Full name *</label><input type="text" id="fullName" required></div>
        <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Phone number *</label><input type="tel" id="phone" required></div>
        <div class="form-group"><label>Street address *</label><textarea id="address" rows="2" required></textarea></div>
        <div class="form-group"><label>City / State</label><input type="text" id="cityState" placeholder="e.g., Ikeja, Lagos"></div>
      </form>
    </div>
    <div class="order-summary">
      <h2>Order Summary</h2>
      <div id="summaryItems"></div>
      <div class="summary-total">Total: ₦<span id="summaryTotal">0</span></div>
      <button class="place-order-btn" id="placeOrderBtn">Place Order & Pay</button>
      <a href="shipping.html" class="back-link">← Back to shipping</a>
    </div>
  </div>

  <footer class="footer"><p>© 2025 PrimeCart</p></footer>

  <script type="module">
    import { supabase } from "./supabase.js";

    let cart = JSON.parse(localStorage.getItem("primecart_cart")) || [];
    const shippingData = JSON.parse(localStorage.getItem("shipping_data")) || { method: "pickup", fee: 0, location: null, country: "nigeria" };

    function renderSummary() {
      const container = document.getElementById("summaryItems");
      const totalSpan = document.getElementById("summaryTotal");
      if (!container) return;
      if (cart.length === 0) {
        container.innerHTML = "<p>Your cart is empty.</p>";
        totalSpan.innerText = "0";
        return;
      }
      let subtotal = 0;
      let html = "";
      cart.forEach(item => {
        const itemTotal = item.price * item.qty;
        subtotal += itemTotal;
        html += `<div class="summary-item"><span>${escapeHtml(item.name)} x ${item.qty}</span><span>₦${itemTotal.toLocaleString()}</span></div>`;
      });
      const shippingFee = shippingData.fee || 0;
      const total = subtotal + shippingFee;
      html += `<div class="summary-item"><strong>Shipping fee</strong><span>₦${shippingFee.toLocaleString()}</span></div>`;
      container.innerHTML = html;
      totalSpan.innerText = total.toLocaleString();
    }

    function generateOrderNumber() {
      return 'ORD-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    }

    async function placeOrder() {
      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const address = document.getElementById("address").value.trim();
      const cityState = document.getElementById("cityState").value.trim();

      if (!fullName || !email || !phone || !address) {
        alert("Please fill in all required fields.");
        return;
      }
      if (cart.length === 0) {
        alert("Your cart is empty.");
        window.location.href = "index.html";
        return;
      }

      const orderNumber = generateOrderNumber();
      const subtotal = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
      const shippingFee = shippingData.fee || 0;
      const totalAmount = subtotal + shippingFee;

      const button = document.getElementById("placeOrderBtn");
      button.disabled = true;
      button.textContent = "Processing...";

      try {
        // Insert order
        const { data: order, error: orderError } = await supabase
          .from("orders")
          .insert([{
            order_number: orderNumber,
            customer_name: fullName,
            customer_email: email,
            customer_phone: phone,
            shipping_address: address,
            city: cityState || null,
            state: null,
            country: shippingData.country || "Nigeria",
            shipping_fee: shippingFee,
            shipping_method: shippingData.method,
            shipping_location: shippingData.location || null,
            payment_status: "pending",
            order_status: "pending",
            total_amount: totalAmount,
            status: "pending"
          }])
          .select()
          .single();

        if (orderError) throw orderError;

        // Insert order items
        const orderItems = cart.map(item => ({
          order_id: order.id,
          product_id: item.id,
          product_name: item.name,
          quantity: item.qty,
          price: item.price
        }));
        const { error: itemsError } = await supabase.from("order_items").insert(orderItems);
        if (itemsError) throw itemsError;

        // Update stock AND increase sales_count for each product
        for (const item of cart) {
          const { data: product, error: fetchError } = await supabase
            .from("products")
            .select("stock_quantity, sales_count")
            .eq("id", item.id)
            .single();
          if (fetchError) throw fetchError;

          const newStock = (product.stock_quantity || 0) - item.qty;
          const newSales = (product.sales_count || 0) + item.qty;

          const { error: updateError } = await supabase
            .from("products")
            .update({ 
              stock_quantity: newStock,
              sales_count: newSales 
            })
            .eq("id", item.id);
          if (updateError) throw updateError;
        }

        // Clear local cart and shipping data
        localStorage.removeItem("primecart_cart");
        localStorage.removeItem("shipping_data");
        cart = [];

        // Redirect to payment page with order ID
        window.location.href = `payment.html?order_id=${order.id}`;
      } catch (err) {
        alert("Error creating order: " + err.message);
        console.error(err);
        button.disabled = false;
        button.textContent = "Place Order & Pay";
      }
    }

    function escapeHtml(str) { return str?.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) || ""; }

    // Theme & mobile menu
    function setThemeIcon() { const isDark = document.body.classList.contains("dark"); const btn = document.getElementById("themeToggleBtn"); if(btn) btn.textContent = isDark ? "☀️" : "🌙"; }
    window.toggleTheme = () => { document.body.classList.toggle("dark"); localStorage.setItem("primecart_theme", document.body.classList.contains("dark") ? "dark" : "light"); setThemeIcon(); };
    if (localStorage.getItem("primecart_theme") === "dark") document.body.classList.add("dark");
    setThemeIcon();
    document.getElementById("themeToggleBtn")?.addEventListener("click", () => window.toggleTheme());
    window.toggleMenu = () => document.getElementById("navLinks").classList.toggle("active");
    document.getElementById("hamburgerBtn")?.addEventListener("click", () => window.toggleMenu());

    function updateCartBadge() {
      const count = cart.reduce((s, i) => s + i.qty, 0);
      const badge = document.getElementById("cartCount");
      if (badge) badge.innerText = count;
    }
    updateCartBadge();
    renderSummary();
    document.getElementById("placeOrderBtn").addEventListener("click", placeOrder);
  </script>
</body>
</html>
