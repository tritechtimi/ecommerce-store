<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Orders Dashboard | PrimeCart Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* additional orders-specific styles */
    .orders-container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .orders-card {
      background: white;
      border-radius: 28px;
      padding: 1.5rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border: 1px solid #eef2f8;
    }
    body.dark .orders-card {
      background: #1e293b;
      border-color: #334155;
    }
    .orders-table {
      width: 100%;
      border-collapse: collapse;
      overflow-x: auto;
      display: block;
    }
    .orders-table th, .orders-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eef2f8;
    }
    body.dark .orders-table th, body.dark .orders-table td {
      border-bottom-color: #334155;
    }
    .orders-table th {
      font-weight: 700;
      background: #f8fafc;
    }
    body.dark .orders-table th {
      background: #111827;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-pending { background: #f9731620; color: #f97316; }
    .status-shipped { background: #3b82f620; color: #3b82f6; }
    .status-delivered { background: #22c55e20; color: #22c55e; }
    .status-cancelled { background: #ef444420; color: #ef4444; }
    .view-items-btn, .update-status-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.7rem;
    }
    .update-status-btn {
      background: #475569;
      margin-left: 6px;
    }
    .status-select {
      padding: 4px 8px;
      border-radius: 20px;
      border: 1px solid #cbd5e1;
      background: white;
    }
    body.dark .status-select {
      background: #0f172a;
      border-color: #334155;
      color: white;
    }
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      border-radius: 28px;
      max-width: 500px;
      width: 90%;
      padding: 1.5rem;
      max-height: 80vh;
      overflow-y: auto;
    }
    body.dark .modal-content {
      background: #1e293b;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .close-modal {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
    }
    .order-items-list {
      list-style: none;
    }
    .order-items-list li {
      padding: 8px 0;
      border-bottom: 1px solid #eef2f8;
    }
    @media (max-width: 768px) {
      .orders-table th, .orders-table td {
        padding: 8px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><span class="logo-mark">📦</span> Admin Dashboard</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Storefront</a></li>
      <li><a href="admin.html">Products</a></li>
      <li><a href="admin-orders.html" class="active-nav">Orders</a></li>
    </ul>
    <div class="nav-actions">
      <button class="icon-btn theme-toggle" id="themeToggleBtn">🌙</button>
      <button class="hamburger" id="hamburgerBtn">☰</button>
    </div>
  </nav>

  <div class="orders-container">
    <div class="orders-card">
      <h2 style="margin-bottom: 1rem;">📋 Customer Orders</h2>
      <div id="ordersTableContainer">
        <div class="loader-shimmer">Loading orders...</div>
      </div>
    </div>
  </div>

  <!-- Modal for order items -->
  <div id="orderItemsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Order Items</h3>
        <button class="close-modal" onclick="closeModal()">✕</button>
      </div>
      <div id="modalItemsList"></div>
    </div>
  </div>

  <footer class="footer"><p>PrimeCart Admin · Order Management</p></footer>

  <script type="module">
    import { supabase } from "./supabase.js";

    let currentOrders = [];

    // Helper: format date
    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      const d = new Date(dateStr);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
    }

    // Render orders table
    async function fetchAndRenderOrders() {
      const container = document.getElementById("ordersTableContainer");
      try {
        container.innerHTML = `<div class="loader-shimmer">Fetching orders...</div>`;
        const { data: orders, error } = await supabase
          .from("orders")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) throw error;
        if (!orders || orders.length === 0) {
          container.innerHTML = `<div class="empty-state">No orders yet.</div>`;
          return;
        }
        currentOrders = orders;

        let html = `<div style="overflow-x: auto;"><table class="orders-table">
          <thead>
            <tr><th>Order #</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr>
          </thead>
          <tbody>`;
        orders.forEach(order => {
          let statusClass = '';
          if (order.status === 'pending') statusClass = 'status-pending';
          else if (order.status === 'shipped') statusClass = 'status-shipped';
          else if (order.status === 'delivered') statusClass = 'status-delivered';
          else if (order.status === 'cancelled') statusClass = 'status-cancelled';
          html += `
            <tr>
              <td><strong>${escapeHtml(order.order_number)}</strong></td>
              <td>${escapeHtml(order.customer_name)}<br><small>${escapeHtml(order.customer_email)}</small></td>
              <td>₦${Number(order.total_amount).toLocaleString()}</td>
              <td><span class="status-badge ${statusClass}">${order.status.toUpperCase()}</span></td>
              <td>${formatDate(order.created_at)}</td>
              <td>
                <button class="view-items-btn" data-order-id="${order.id}">View Items</button>
                <select class="status-select" data-order-id="${order.id}" data-current="${order.status}">
                  <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                  <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                  <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                  <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                </select>
                <button class="update-status-btn" data-order-id="${order.id}">Update</button>
              </td>
            </tr>
          `;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;

        // Attach event listeners
        document.querySelectorAll('.view-items-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const orderId = btn.getAttribute('data-order-id');
            await showOrderItems(orderId);
          });
        });
        document.querySelectorAll('.update-status-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const orderId = btn.getAttribute('data-order-id');
            const select = document.querySelector(`.status-select[data-order-id="${orderId}"]`);
            const newStatus = select.value;
            await updateOrderStatus(orderId, newStatus);
          });
        });
      } catch (err) {
        container.innerHTML = `<div class="error-state">Error: ${err.message}</div>`;
        console.error(err);
      }
    }

    // Show order items modal
    async function showOrderItems(orderId) {
      const modal = document.getElementById("orderItemsModal");
      const modalList = document.getElementById("modalItemsList");
      modalList.innerHTML = "<div class='loader-shimmer'>Loading items...</div>";
      modal.style.display = "flex";

      try {
        const { data: items, error } = await supabase
          .from("order_items")
          .select("*")
          .eq("order_id", orderId);

        if (error) throw error;
        if (!items || items.length === 0) {
          modalList.innerHTML = "<p>No items found.</p>";
          return;
        }
        let html = `<ul class="order-items-list">`;
        items.forEach(item => {
          html += `<li>${escapeHtml(item.product_name)} × ${item.quantity} — ₦${Number(item.price).toLocaleString()} (₦${(item.quantity * item.price).toLocaleString()})</li>`;
        });
        html += `</ul>`;
        modalList.innerHTML = html;
      } catch (err) {
        modalList.innerHTML = `<p class="error-state">Error: ${err.message}</p>`;
      }
    }

    // Update order status
    async function updateOrderStatus(orderId, newStatus) {
      try {
        const { error } = await supabase
          .from("orders")
          .update({ status: newStatus })
          .eq("id", orderId);
        if (error) throw error;
        alert("Order status updated!");
        await fetchAndRenderOrders(); // refresh table
      } catch (err) {
        alert("Update failed: " + err.message);
      }
    }

    function closeModal() {
      document.getElementById("orderItemsModal").style.display = "none";
    }
    window.closeModal = closeModal;

    function escapeHtml(str) { return str?.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) || ""; }

    // Theme & mobile menu (same as admin)
    function setThemeIcon() {
      const isDark = document.body.classList.contains("dark");
      const btn = document.getElementById("themeToggleBtn");
      if (btn) btn.textContent = isDark ? "☀️" : "🌙";
    }
    window.toggleTheme = () => {
      document.body.classList.toggle("dark");
      localStorage.setItem("primecart_theme", document.body.classList.contains("dark") ? "dark" : "light");
      setThemeIcon();
    };
    if (localStorage.getItem("primecart_theme") === "dark") document.body.classList.add("dark");
    setThemeIcon();
    document.getElementById("themeToggleBtn")?.addEventListener("click", () => window.toggleTheme());
    window.toggleMenu = () => document.getElementById("navLinks").classList.toggle("active");
    document.getElementById("hamburgerBtn")?.addEventListener("click", () => window.toggleMenu());

    // Load orders
    fetchAndRenderOrders();
  </script>
</body>
</html>
